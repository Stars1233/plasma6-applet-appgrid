  <rect x="0.5" y="0.5" width="63" height="63" rx="7.5" fill="none" stroke="url(#edge)" stroke-width="1"/>
  <rect width="64" height="64" rx="8" fill="url(#longShadow)" mask="url(#shadowMask)"/>
