<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3daee9"/>
      <stop offset="100%" stop-color="#1d99f3"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="longShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.20"/>
      <stop offset="80%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <mask id="shadowMask" maskUnits="userSpaceOnUse" x="0" y="0" width="64" height="64">
      <rect width="64" height="64" fill="#000"/>
      <!-- Each tile's rx2 rounded square extruded +80,+80 at 45°. Near (tile-
           side) corners are rx2 so they coincide with the white tile's rounding
           and don't bleed past it; far corners rounded to soften the tip. -->
      <g fill="#fff">
        <path d="M12,14 A2,2 0 0 1 14,12 L26,12 A2,2 0 0 1 27.41,12.59 L107.41,92.59 A2,2 0 0 1 108,94 L108,106 A2,2 0 0 1 106,108 L94,108 A2,2 0 0 1 92.59,107.41 L12.59,27.41 A2,2 0 0 1 12,26 Z"/>
        <path d="M36,14 A2,2 0 0 1 38,12 L50,12 A2,2 0 0 1 51.41,12.59 L131.41,92.59 A2,2 0 0 1 132,94 L132,106 A2,2 0 0 1 130,108 L118,108 A2,2 0 0 1 116.59,107.41 L36.59,27.41 A2,2 0 0 1 36,26 Z"/>
        <path d="M12,38 A2,2 0 0 1 14,36 L26,36 A2,2 0 0 1 27.41,36.59 L107.41,116.59 A2,2 0 0 1 108,118 L108,130 A2,2 0 0 1 106,132 L94,132 A2,2 0 0 1 92.59,131.41 L12.59,51.41 A2,2 0 0 1 12,50 Z"/>
        <path d="M36,38 A2,2 0 0 1 38,36 L50,36 A2,2 0 0 1 51.41,36.59 L131.41,116.59 A2,2 0 0 1 132,118 L132,130 A2,2 0 0 1 130,132 L118,132 A2,2 0 0 1 116.59,131.41 L36.59,51.41 A2,2 0 0 1 36,50 Z"/>
      </g>
    </mask>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#body)"/>
  <rect width="64" height="64" rx="8" fill="url(#gloss)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="7.5" fill="none" stroke="url(#edge)" stroke-width="1"/>
  <rect width="64" height="64" rx="8" fill="url(#longShadow)" mask="url(#shadowMask)"/>
  <g fill="url(#tile)">
    <rect x="12" y="12" width="16" height="16" rx="2"/>
    <rect x="36" y="12" width="16" height="16" rx="2"/>
    <rect x="12" y="36" width="16" height="16" rx="2"/>
    <rect x="36" y="36" width="16" height="16" rx="2"/>
  </g>
</svg>
